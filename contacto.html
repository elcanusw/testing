<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - 107d</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="glass-nav">
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="sobremi.html">Sobre Mí</a></li>
            <li><a href="servicios.html">Servicios</a></li>
            <li><a href="contacto.html" class="active">Contacto</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="header-section fade-in">
            <h1 class="glow-text">¿Hablamos?</h1>
            <p class="subtitle">Estoy a un mensaje de distancia para hacer realidad tu proyecto.</p>
        </div>

        <div class="contact-wrapper">
            
            <div class="glass-card contact-card fade-in">
                <form action="https://formspree.io/f/mvzdlqzg" method="POST">
                    <div class="input-group">
                        <input type="text" name="nombre" placeholder="Tu Nombre" class="neumorph-input" required>
                    </div>
                    <div class="input-group">
                        <input type="email" name="email" placeholder="Tu Email" class="neumorph-input" required>
                    </div>
                    <div class="input-group">
                        <textarea name="mensaje" placeholder="Cuéntame sobre tu idea..." class="neumorph-input" rows="5" required></textarea>
                    </div>
                    
                    <input type="hidden" name="_subject" value="Nuevo mensaje desde 107d Web">
                    
                    <button type="submit" class="glass-btn btn-send">Enviar Mensaje</button>
                </form>
            </div>

            <div class="social-side fade-in">
                <h3>También puedes encontrarme en:</h3>
                <div class="social-grid">
                    <a href="mailto:soluciones107d@gmail.com" class="social-item gmail" title="Gmail">
                        <i class="fas fa-envelope"></i>
                    </a>
                    <a href="https://wa.me/56974598279" target="_blank" class="social-item whatsapp" title="WhatsApp">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                    <a href="https://facebook.com/tu-perfil" target="_blank" class="social-item facebook" title="Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                    <a href="https://instagram.com/tu-perfil" target="_blank" class="social-item instagram" title="Instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://tiktok.com/@tu-perfil" target="_blank" class="social-item tiktok" title="TikTok">
                        <i class="fab fa-tiktok"></i>
                    </a>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
