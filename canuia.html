<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Asistente Virtual</title>
    <style>
        :root {
            --primary-glow: #4a90e2;
            --terminal-green: #00ff41;
            --bg-dark: #0a0a1a;
            --glass-bg: rgba(0, 0, 0, 0.85);
        }

        /* Reset y Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Contenedor Principal */
        .main-stage {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Efectos de Fondo */
        .aura-bg {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.5;
            animation: pulseAura 4s ease-in-out infinite;
            z-index: 1;
        }

        /* Personaje */
        .character-view {
            position: relative;
            z-index: 10;
            width: 220px;
            height: 220px;
            margin-bottom: 20px;
        }

        .character-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 0 40px rgba(74, 144, 226, 0.3);
            animation: floatCharacter 5s ease-in-out infinite;
        }

        .character-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-image: url('https://elcanusw.github.io/testing/img107/canuav.png');
            background-size: cover;
            background-position: center;
        }

        .hand-wave {
            position: absolute;
            top: 120px;
            right: -10px;
            font-size: 45px;
            z-index: 20;
            animation: waveHand 2s ease-in-out infinite;
            transform-origin: bottom right;
            pointer-events: none;
        }

        /* Interfaz de Chat (Subtítulos) */
        .chat-interface {
            position: relative;
            z-index: 30;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .subtitle-box {
            width: 100%;
            background: var(--glass-bg);
            border: 1px solid var(--terminal-green);
            border-radius: 12px;
            padding: 18px;
            color: var(--terminal-green);
            font-size: 0.95rem;
            line-height: 1.4;
            min-height: 80px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        /* Botones de Opciones */
        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            width: 100%;
        }

        .option-btn {
            background: transparent;
            border: 1px solid var(--terminal-green);
            color: var(--terminal-green);
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }

        .option-btn.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .option-btn:hover {
            background: var(--terminal-green);
            color: #000;
            box-shadow: 0 0 20px var(--terminal-green);
        }

        /* Animaciones */
        @keyframes pulseAura {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }

        @keyframes floatCharacter {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes waveHand {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(20deg); }
            75% { transform: rotate(-10deg); }
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1rem;
            background-color: var(--terminal-green);
            margin-left: 4px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Línea de Escaneo Estilo Retro */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 65, 0.02) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <div class="main-stage">
        <div class="aura-bg"></div>
        
        <!-- Personaje -->
        <div class="character-view">
            <div class="character-circle">
                <div class="character-img"></div>
            </div>
            <div class="hand-wave" id="hand">👋</div>
        </div>

        <!-- Interfaz de Conversación -->
        <div class="chat-interface">
            <div class="subtitle-box">
                <span id="text"></span><span class="cursor"></span>
            </div>

            <div class="options-grid" id="options">
                <!-- Botones inyectados por JS -->
            </div>
        </div>
    </div>

    <script>
        const textElement = document.getElementById('text');
        const optionsElement = document.getElementById('options');
        const handElement = document.getElementById('hand');

        const chatData = {
            inicio: {
                texto: "¡Hola! Soy eLcAnu!!! virtual. ¿En qué puedo ayudarte hoy?",
                opciones: [
                    { texto: "Servicios 107D", proximo: "servicios" },
                    { texto: "Saber más de ti", proximo: "perfil" }
                ]
            },
            servicios: {
                texto: "Ofrezco Publicidad Digital (Community Manager, Redes Sociales) y Soluciones Gráficas (Logos, Flyers). ¿Qué necesitas?",
                opciones: [
                    { texto: "Publicidad", proximo: "web" },
                    { texto: "Diseño Gráfico", proximo: "diseno" },
                    { texto: "Volver", proximo: "inicio" }
                ]
            },
            perfil: {
                texto: "Soy apasionado por la tecnología, autodidacta en Diseño y Programación Web. ¿Vemos el Portafolio o te cuento más?",
                opciones: [
                    { texto: "Ver Portafolio", proximo: "portfolio" },
                    { texto: "Saber más de ti", link: "sobremi.html" },
                    { texto: "Volver", proximo: "inicio" }
                ]
            },
            web: {
                texto: "¡Genial! Desarrollo sitios rápidos y escalables. ¿Hablamos por WhatsApp?",
                opciones: [
                    { texto: "WhatsApp", link: "https://wa.me/+56974598279" },
                    { texto: "Ver más", proximo: "inicio" }
                ]
            },
            diseno: {
                texto: "El diseño es clave. Me enfoco en la experiencia del usuario. ¿Vemos ejemplos?",
                opciones: [
                    { texto: "Ir a Portfolio", link: "#" },
                    { texto: "Volver", proximo: "inicio" }
                ]
            },
            portfolio: {
                texto: "¡Casi listo! Mi nueva galería de proyectos está en el horno.",
                opciones: [
                    { texto: "Entendido", proximo: "inicio" }
                ]
            }
        };

        function typeText(message, callback) {
            textElement.textContent = "";
            optionsElement.innerHTML = "";
            let i = 0;
            
            function nextChar() {
                if (i < message.length) {
                    textElement.textContent += message.charAt(i);
                    i++;
                    setTimeout(nextChar, 35);
                } else if (callback) {
                    callback();
                }
            }
            nextChar();
        }

        function showOptions(options) {
            options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.texto;
                btn.onclick = () => {
                    if (opt.link) {
                        if (opt.link.startsWith('http')) {
                            window.open(opt.link, '_blank');
                        } else {
                            window.location.href = opt.link;
                        }
                    } else {
                        loadStep(opt.proximo);
                    }
                };
                optionsElement.appendChild(btn);
                // Cascada de aparición
                setTimeout(() => btn.classList.add('visible'), 100 * (index + 1));
            });
        }

        function loadStep(stepId) {
            const step = chatData[stepId];
            typeText(step.texto, () => showOptions(step.opciones));
            handElement.style.display = (stepId === 'inicio') ? "block" : "none";
        }

        window.onload = () => setTimeout(() => loadStep('inicio'), 800);
    </script>
</body>
</html>
