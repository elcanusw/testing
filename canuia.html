<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: transparent;
            color: #00ff00; /* Verde terminal */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        #text-container {
            height: 50px; /* Espacio fijo para que no empuje nada */
            margin-bottom: 10px;
            font-size: 14px;
            text-shadow: 0 0 5px #00ff00;
            padding: 0 10px;
        }

        .avatar-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 2px solid #00ff00;
            object-fit: cover;
        }

        #skip-btn {
            margin-top: 15px;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 10px;
            border-radius: 5px;
            transition: 0.3s;
            opacity: 0.6;
        }

        #skip-btn:hover {
            opacity: 1;
            background: #00ff00;
            color: black;
        }
    </style>
</head>
<body>

    <div id="text-container"></div>
    
    <img src="https://elcanusw.github.io/testing/img107/canuia2.png" class="avatar-img" alt="Canu">

    <button id="skip-btn" onclick="skipTyping()">MOSTRAR TODO</button>

    <script>
        const texts = [
            "Iniciando sistema 107D...",
            "Conectando con Valparaíso...",
            "Diseño gráfico cargado.",
            "Servicios eléctricos activos.",
            "Tu imaginación propone...",
            "Nosotros concretamos."
        ];

        let currentLine = 0;
        let currentChar = 0;
        let isSkipped = false;
        const container = document.getElementById('text-container');

        function type() {
            if (isSkipped) return;

            if (currentChar < texts[currentLine].length) {
                container.innerHTML = texts[currentLine].substring(0, currentChar + 1) + "_";
                currentChar++;
                setTimeout(type, 50);
            } else {
                // Espera un momento y limpia para la siguiente línea
                setTimeout(() => {
                    if (currentLine < texts.length - 1) {
                        currentChar = 0;
                        currentLine++;
                        type();
                    } else {
                        container.innerHTML = texts[currentLine]; // Se queda el último mensaje
                    }
                }, 1500);
            }
        }

        function skipTyping() {
            isSkipped = true;
            container.innerHTML = texts[texts.length - 1]; // Muestra el mensaje final directamente
            document.getElementById('skip-btn').style.display = 'none'; // Desaparece el botón
        }

        // Inicia la animación
        type();
    </script>
</body>
</html>
