<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Potencial Digital</title>
    <style>
        :root {
            --primary-glow: #4a90e2;
            --accent-glow: #8257e5;
            --terminal-green: #00ff41;
            --bg-dark: #0a0a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .video-container {
            position: relative;
            width: 500px;
            height: 600px; /* Un poco más alto para los botones */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .aura-bg {
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.6;
            animation: pulseAura 4s ease-in-out infinite;
            z-index: 1;
        }

        .character-wrapper {
            position: relative;
            z-index: 2;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(74, 144, 226, 0.5);
            animation: floatCharacter 6s ease-in-out infinite;
          }

        .character-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Usamos la imagen que subiste */
            background-image: url('https://elcanusw.github.io/testing/img107/canuia2.png');
            background-size: cover;
            background-position: center;
        }

        .hand-wave {
            position: absolute;
            top: 150px;
            right: 80px;
            font-size: 50px;
            z-index: 3;
            animation: waveHand 2s ease-in-out infinite;
            transform-origin: bottom right;
        }

        .subtitle-box {
            position: relative;
            margin-top: 30px;
            width: 90%;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--terminal-green);
            border-radius: 8px;
            padding: 15px;
            color: var(--terminal-green);
            font-size: 1rem;
            text-align: left;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            z-index: 4;
            min-height: 60px;
        }

        .options-container {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 5;
        }

        .option-btn {
            background: transparent;
            border: 1px solid var(--terminal-green);
            color: var(--terminal-green);
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            transition: 0.3s;
            opacity: 0; /* Aparecen después del texto */
            pointer-events: none;
        }

        .option-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .option-btn:hover {
            background: var(--terminal-green);
            color: black;
            box-shadow: 0 0 15px var(--terminal-green);
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1rem;
            background-color: var(--terminal-green);
            margin-left: 5px;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes pulseAura {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }

        @keyframes floatCharacter {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes waveHand {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(20deg); }
            75% { transform: rotate(-10deg); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.2);
            z-index: 5;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="scan-line"></div>
        <div class="aura-bg"></div>
        
        <div class="character-wrapper">
            <div class="character-img"></div>
        </div>

        <div class="hand-wave" id="hand">👋</div>

        <div class="subtitle-box">
            <span id="text"></span><span class="cursor"></span>
        </div>

        <div class="options-container" id="options">
            <!-- Los botones se generarán dinámicamente -->
        </div>
    </div>

    <script>
        const textElement = document.getElementById('text');
        const optionsElement = document.getElementById('options');
        const handElement = document.getElementById('hand');

        // Estructura de la conversación (Flujo guiado)
        const chatData = {
            inicio: {
                texto: "¡Hola! Soy tu asistente digital. ¿En qué puedo ayudarte hoy?",
                opciones: [
                    { texto: "Ver tus servicios", proximo: "servicios" },
                    { texto: "Conocer tu perfil", proximo: "perfil" }
                ]
            },
            servicios: {
                texto: "Ofrezco desarrollo web, diseño UI/UX y soluciones tecnológicas personalizadas. ¿Te interesa algún área?",
                opciones: [
                    { texto: "Desarrollo Web", proximo: "web" },
                    { texto: "Diseño Creativo", proximo: "diseno" },
                    { texto: "Volver", proximo: "inicio" }
                ]
            },
            perfil: {
                texto: "Soy un desarrollador apasionado por la innovación y la eficiencia digital. ¿Quieres ver mi portfolio?",
                opciones: [
                    { texto: "¡Sí, muéstrame!", proximo: "portfolio" },
                    { texto: "Volver atrás", proximo: "inicio" }
                ]
            },
            web: {
                texto: "Excelente elección. Construyo sitios rápidos, seguros y escalables. ¿Hablamos por WhatsApp?",
                opciones: [
                    { texto: "Contactar ahora", link: "https://wa.me/tu-numero" },
                    { texto: "Ver otros temas", proximo: "inicio" }
                ]
            },
            diseno: {
                texto: "El diseño es la cara de tu negocio. Me enfoco en la experiencia del usuario. ¿Quieres ver ejemplos?",
                opciones: [
                    { texto: "Ver Behance/Portfolio", link: "#" },
                    { texto: "Volver", proximo: "inicio" }
                ]
            },
            portfolio: {
                texto: "Estoy preparando mi nueva galería de proyectos. ¡Estará lista pronto!",
                opciones: [
                    { texto: "Entendido", proximo: "inicio" }
                ]
            }
        };

        let isTyping = false;

        function typeText(message, callback) {
            isTyping = true;
            textElement.textContent = "";
            optionsElement.innerHTML = "";
            let i = 0;
            
            function nextChar() {
                if (i < message.length) {
                    textElement.textContent += message.charAt(i);
                    i++;
                    setTimeout(nextChar, 40);
                } else {
                    isTyping = false;
                    if (callback) callback();
                }
            }
            nextChar();
        }

        function showOptions(options) {
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.texto;
                btn.onclick = () => {
                    if (opt.link) {
                        window.open(opt.link, '_blank');
                    } else {
                        loadStep(opt.proximo);
                    }
                };
                optionsElement.appendChild(btn);
                
                // Animación de aparición
                setTimeout(() => btn.classList.add('visible'), 100);
            });
        }

        function loadStep(stepId) {
            const step = chatData[stepId];
            typeText(step.texto, () => {
                showOptions(step.opciones);
            });
            
            // Saludo solo al inicio o cuando vuelve
            if(stepId === 'inicio') {
                handElement.style.display = "block";
            } else {
                handElement.style.display = "none";
            }
        }

        // Iniciar el chat
        window.onload = () => {
            setTimeout(() => loadStep('inicio'), 1000);
        };
    </script>
</body>
</html>
