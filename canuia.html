<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación Digital</title>
    <style>
        :root {
            --primary-glow: #4a90e2;
            --accent-glow: #8257e5;
            --terminal-green: #00ff41;
            --bg-dark: #0a0a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .video-container {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Aura animada detrás del personaje */
        .aura-bg {
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.6;
            animation: pulseAura 4s ease-in-out infinite;
            z-index: 1;
        }

        /* Contenedor del personaje */
        .character-wrapper {
            position: relative;
            z-index: 2;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(74, 144, 226, 0.5);
            animation: floatCharacter 6s ease-in-out infinite;
        }

        .character-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Usamos la imagen que subiste */
            background-image: url('https://files.oaiusercontent.com/file-SgC582o2CByLgY81yWz4Tq?se=2024-10-27T01%3A10%3A05Z&sp=r&sv=2024-08-04&sr=b&rscc=max-age%3D604800%2C%20immutable%2C%20private&rscd=attachment%3B%20filename%3Dimage_1d3615.jpg&sig=v23iMvI05W0E1tW9q5y2S3t6lFwA%2Byj4zN86qXm5Bms%3D');
            background-size: cover;
            background-position: center;
        }

        /* Mano saludando (Emoji animado sobre la imagen) */
        .hand-wave {
            position: absolute;
            bottom: 60px;
            right: 40px;
            font-size: 50px;
            z-index: 3;
            animation: waveHand 2s ease-in-out infinite;
            transform-origin: bottom right;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        /* Consola de subtítulos */
        .subtitle-box {
            position: absolute;
            bottom: 20px;
            width: 90%;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--terminal-green);
            border-radius: 8px;
            padding: 15px;
            color: var(--terminal-green);
            font-size: 1.1rem;
            text-align: left;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            z-index: 4;
            min-height: 50px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.1rem;
            background-color: var(--terminal-green);
            margin-left: 5px;
            animation: blink 0.8s step-end infinite;
            vertical-align: middle;
        }

        /* Animaciones */
        @keyframes pulseAura {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        @keyframes floatCharacter {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes waveHand {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(20deg); }
            75% { transform: rotate(-10deg); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Escaneo de sistema (Efecto visual) */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.3);
            z-index: 5;
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="scan-line"></div>
        <div class="aura-bg"></div>
        
        <div class="character-wrapper">
            <div class="character-img"></div>
        </div>

        <div class="hand-wave">👋</div>

        <div class="subtitle-box" id="subtitleContainer">
            <span id="text"></span><span class="cursor"></span>
        </div>
    </div>

    <script>
        const messages = [
            "INICIANDO SISTEMA...",
            "USUARIO IDENTIFICADO: POTENCIAL DIGITAL",
            "Hola, soy tu perfil creativo y tecnológico.",
            "Listo para llevar tus proyectos al siguiente nivel.",
            "¿Comenzamos el desarrollo?",
            "ESTADO: EN LÍNEA / CONEXIÓN SEGURA"
        ];

        let messageIndex = 0;
        let charIndex = 0;
        const textElement = document.getElementById('text');
        const typingSpeed = 70;
        const delayBetweenMessages = 2000;

        function type() {
            if (charIndex < messages[messageIndex].length) {
                textElement.textContent += messages[messageIndex].charAt(charIndex);
                charIndex++;
                setTimeout(type, typingSpeed);
            } else {
                setTimeout(erase, delayBetweenMessages);
            }
        }

        function erase() {
            if (charIndex > 0) {
                textElement.textContent = messages[messageIndex].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(erase, 20);
            } else {
                messageIndex = (messageIndex + 1) % messages.length;
                setTimeout(type, 500);
            }
        }

        // Iniciar la animación al cargar
        window.onload = () => {
            setTimeout(type, 1000);
        };
    </script>
</body>
</html>
