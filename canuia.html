<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanuIA - Asistente Virtual</title>
    <style>
        :root {
            --primary-glow: #4a90e2;
            --bg-dark: #0a0a1a; /* Fondo oscuro de tu web */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --main-gradient: linear-gradient(to bottom, #0088ff 0%, #ffffff 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* BARRA DE NAVEGACIÓN (EL MENÚ QUE ADJUNTSTE) */
        .navbar {
            margin-top: 20px;
            padding: 10px 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            display: flex;
            gap: 25px;
            z-index: 1000;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-family: sans-serif; /* Fuente más limpia para el menú */
            font-weight: 500;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #4a90e2;
        }

        .navbar a.active {
            color: #9d85ff; /* El color morado de tu imagen */
        }

        /* ESCENARIO DEL CHATBOT */
        .main-stage {
            position: relative;
            width: 100%;
            max-width: 500px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .aura-bg {
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.3;
            animation: pulseAura 4s ease-in-out infinite;
            z-index: 1;
        }

        .character-view {
            position: relative;
            z-index: 10;
            width: 220px;
            height: 220px;
            margin-bottom: 20px;
        }

        .character-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(74, 144, 226, 0.5);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(74, 144, 226, 0.3);
            animation: floatCharacter 5s ease-in-out infinite;
        }

        .character-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-image: url('https://elcanusw.github.io/testing/img107/canuav.png');
            background-size: cover;
            background-position: center;
        }

        .hand-wave {
            position: absolute;
            top: 120px;
            right: -10px;
            font-size: 45px;
            z-index: 20;
            animation: waveHand 2s ease-in-out infinite;
            transform-origin: bottom right;
        }

        .chat-interface {
            position: relative;
            z-index: 30;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .subtitle-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #4a90e2;
            border-radius: 15px;
            padding: 20px;
            min-height: 90px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #text {
            background: var(--main-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .option-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-family: inherit;
            transition: 0.3s;
            opacity: 0;
            transform: translateY(10px);
        }

        .option-btn.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .option-btn:hover {
            border-color: #0088ff;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 136, 255, 0.3);
        }

        /* ANIMACIONES */
        @keyframes pulseAura {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.3); opacity: 0.4; }
        }
        @keyframes floatCharacter {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes waveHand {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(20deg); }
            75% { transform: rotate(-10deg); }
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1rem;
            background-color: #ffffff;
            margin-left: 4px;
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(255, 255, 255, 0.01) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <nav class="navbar">
        <a href="index.html">Inicio</a>
        <a href="sobremi.html">Sobre Mí</a>
        <a href="servicios.html">Servicios</a>
        <a href="planes.html">Planes</a>
        <a href="#" class="active">Contacto</a>
    </nav>

    <div class="main-stage">
        <div class="aura-bg"></div>
        
        <div class="character-view">
            <div class="character-circle">
                <div class="character-img"></div>
            </div>
            <div class="hand-wave" id="hand">👋</div>
        </div>

        <div class="chat-interface">
            <div class="subtitle-box">
                <span id="text"></span><span class="cursor"></span>
            </div>
            <div class="options-grid" id="options"></div>
        </div>
    </div>

    <script>
        const textElement = document.getElementById('text');
        const optionsElement = document.getElementById('options');
        const handElement = document.getElementById('hand');

        const chatData = {
            inicio: {
                texto: "¡Hola! Soy eLcAnu!!! virtual. ¿En qué puedo ayudarte hoy?",
                opciones: [
                    { texto: "Servicios 107D", proximo: "servicios" },
                    { texto: "Saber más de ti", proximo: "perfil" }
                ]
            },
            servicios: {
                texto: "Ofrezco Publicidad Digital y Soluciones Gráficas. ¿Qué necesitas?",
                opciones: [
                    { texto: "Publicidad", proximo: "web" },
                    { texto: "Diseño Gráfico", proximo: "diseno" },
                    { texto: "Volver", proximo: "inicio" }
                ]
            },
            perfil: {
                texto: "Soy apasionado por la tecnología y el diseño. ¿Vemos mi trabajo?",
                opciones: [
                    { texto: "Ver Portafolio", link: "portfolio.html" },
                    { texto: "Volver", proximo: "inicio" }
                ]
            },
            web: {
                texto: "¡Genial! Desarrollo sitios rápidos. ¿Hablamos por WhatsApp?",
                opciones: [
                    { texto: "WhatsApp", link: "https://wa.me/+56974598279" },
                    { texto: "Volver", proximo: "inicio" }
                ]
            },
            diseno: {
                texto: "El diseño es clave para tu marca. ¿Te gustaría ver ejemplos?",
                opciones: [
                    { texto: "Ver Proyectos", link: "portfolio.html" },
                    { texto: "Volver", proximo: "inicio" }
                ]
            }
        };

        function typeText(message, callback) {
            textElement.textContent = "";
            optionsElement.innerHTML = "";
            let i = 0;
            function nextChar() {
                if (i < message.length) {
                    textElement.textContent += message.charAt(i);
                    i++;
                    setTimeout(nextChar, 30);
                } else if (callback) { callback(); }
            }
            nextChar();
        }

        function showOptions(options) {
            options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.texto;
                btn.onclick = () => {
                    if (opt.link) {
                        window.open(opt.link, '_blank');
                    } else {
                        loadStep(opt.proximo);
                    }
                };
                optionsElement.appendChild(btn);
                setTimeout(() => btn.classList.add('visible'), 100 * (index + 1));
            });
        }

        function loadStep(stepId) {
            const step = chatData[stepId];
            typeText(step.texto, () => showOptions(step.opciones));
            handElement.style.display = (stepId === 'inicio') ? "block" : "none";
        }

        window.onload = () => setTimeout(() => loadStep('inicio'), 500);
    </script>
</body>
</html>
