<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: transparent; /* Para que se vea el fondo morado del index */
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        #text-container {
            height: 60px; /* Espacio reservado para el texto */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: #a78bfa; /* El púrpura de 107D */
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(167, 139, 250, 0.5);
        }

        .avatar-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 3px solid #3b82f6;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
            object-fit: cover;
        }

        #skip-btn {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 0.7rem;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        #skip-btn:hover {
            background: #a78bfa;
            color: white;
            border-color: #a78bfa;
        }
    </style>
</head>
<body>

    <div id="text-container"></div>
    
    <img src="https://elcanusw.github.io/testing/img107/canuia2.png" class="avatar-img" alt="Canu">

    <button id="skip-btn" onclick="skipTyping()">Saltar Animación</button>

    <script>
        const texts = [
            "Conectando soluciones...",
            "Diseño Gráfico Profesional",
            "Servicios Eléctricos",
            "Tu imaginación propone...",
            "En 107D concretamos."
        ];

        let currentLine = 0;
        let currentChar = 0;
        let isSkipped = false;
        const container = document.getElementById('text-container');

        function type() {
            if (isSkipped) return;

            if (currentChar < texts[currentLine].length) {
                container.innerHTML = texts[currentLine].substring(0, currentChar + 1) + "|";
                currentChar++;
                setTimeout(type, 60);
            } else {
                setTimeout(() => {
                    if (currentLine < texts.length - 1) {
                        currentChar = 0;
                        currentLine++;
                        type();
                    } else {
                        container.innerHTML = texts[currentLine];
                        document.getElementById('skip-btn').style.opacity = '0';
                    }
                }, 1800);
            }
        }

        function skipTyping() {
            isSkipped = true;
            container.innerHTML = texts[texts.length - 1];
            document.getElementById('skip-btn').style.display = 'none';
        }

        type();
    </script>
</body>
</html>
