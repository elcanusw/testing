<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>107D | Tu Imaginación Concretada</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #a78bfa;
            --accent-blue: #4a90e2;
            --main-gradient: linear-gradient(to bottom, #0088ff 0%, #ffffff 100%);
        }

        body {
            background-color: var(--primary-bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, #050505);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Menú Superior */
        .glass-nav-top {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px 30px;
            border-radius: 50px;
            z-index: 1000;
        }

        .nav-list {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 20px;
        }

        .nav-list a {
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-list a:hover, .nav-list a.active {
            color: var(--accent);
        }

        /* Contenedor Principal Ajustado */
        .main-content {
            padding-top: 50px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-center;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* LOGO CENTRADO ARRIBA */
        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 0px;
            margin-top: -80px;
            position: relative;
    z-index: 5;
        }

        .logo-central {
            width: 500px;
            max-width: 85%;
            height: auto;
            filter: drop-shadow(0 0 25px rgba(0, 136, 255, 0.5));
        }

        /* Layout de contenido inferior */
        .content-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 90%;
            max-width: 1200px;
            align-items: center;
            gap: 40px;
        }

        .text-side {
            text-align: left;
        }

        .text-side h1 {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 15px;
            background: var(--main-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-side p {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1.5px;
        }

        .visual-side {
            display: flex;
            justify-content: center;
            position: relative;
        }

        .character-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
        }

        .character-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--accent-blue);
            box-shadow: 0 0 40px rgba(74, 144, 226, 0.3);
            object-fit: cover;
            animation: float 6s ease-in-out infinite;
        }

        /* Etiquetas */
        .tag {
            position: absolute;
            background: var(--glass);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            padding: 8px 18px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: #fff;
            z-index: 20;
            transition: 0.3s;
            cursor: pointer;
        }

        .tag:hover {
            border-color: var(--accent);
            background: rgba(167, 139, 250, 0.2);
            transform: scale(1.1);
        }

        .servicios { top: 15%; left: -30px; }
        .innovacion { top: 0; right: -20px; }
        .portafolio { top: 45%; left: -50px; }
        .rendimiento { top: 55%; right: -60px; }
        .recientes { bottom: 0; right: 10px; }

        /* Botones Inferiores */
        .bottom-panel {
            margin-top: 40px;
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
        }

        .btn-bottom {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 35px;
            border-radius: 15px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-bottom:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
            transform: translateY(-3px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @media (max-width: 1000px) {
            .content-layout { grid-template-columns: 1fr; }
            .text-side { text-align: center; }
            .text-side h1 { font-size: 2.2rem; }
            .logo-central { width: 300px; }
            .main-content { padding-top: 120px; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <nav class="glass-nav-top">
        <ul class="nav-list">
            <li><a href="index.html" class="active">Inicio</a></li>
            <li><a href="canuia.html">Asistente Virtual</a></li>
            <li><a href="sobremi.html">Sobre Mí</a></li>
            <li><a href="servicios.html">Servicios</a></li>
            <li><a href="planes.html">Planes</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="logo-container">
            <img src="https://elcanusw.github.io/testing/img107/logo107D.png" class="logo-central" alt="107D Logo">
        </div>

        <div class="content-layout">
            <div class="text-side">
                <h1>Tu imaginación propone, en 107D lo concretamos...</h1>
                <p>Entre lo pensado y lo real, somos el puente.</p>
            </div>

            <div class="visual-side">
                <div class="character-wrapper">
                    <img src="https://elcanusw.github.io/testing/img107/canuia2.png" alt="eLcAnu" class="character-img">
                    <div class="tag servicios" onclick="location.href='servicios.html'">Servicios</div>
                    <div class="tag innovacion">Innovación Constante</div>
                    <div class="tag portafolio">Portafolio</div>
                    <div class="tag rendimiento">Rendimiento ✅</div>
                    <div class="tag recientes">Proyectos Recientes</div>
                </div>
            </div>
        </div>

        <div class="bottom-panel">
            <a href="servicios.html" class="btn-bottom">Ver Servicios</a>
            <a href="contacto.html" class="btn-bottom">Contáctanos</a>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.1;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(167, 139, 250, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            const count = (canvas.width * canvas.height) / 15000;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
