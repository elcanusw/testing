<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>107D | Tu Imaginación Concretada</title>
    <!-- Google Fonts para Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #a78bfa; 
            --accent-blue: #4a90e2;
            --terminal-green: #00ff41; /* De tu código original */
            --primary-glow: #4a90e2;    /* De tu código original */
        }

        body {
            background-color: var(--primary-bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, #050505);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Fondo de Partículas */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            pointer-events: none;
        }

        /* Línea de Escaneo Retro (Tu código) */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 65, 0.02) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }

        /* Menú Superior */
        .glass-nav-top {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px 30px;
            border-radius: 50px;
            z-index: 1000;
        }

        .nav-list {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 20px;
        }

        .nav-list a {
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-list a:hover, .nav-list a.active {
            color: var(--accent);
        }

        /* Layout Principal */
        .main-content {
            padding-top: 60px;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            align-items: center;
            padding-left: 5%;
            padding-right: 5%;
            z-index: 10;
            position: relative;
        }

        .text-side h1 {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-side p {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            font-weight: 400;
        }

        /* ESTILO RESTAURADO DE TU CÓDIGO (LADO DERECHO) */
        .canuia-side {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .main-stage {
            position: relative;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .aura-bg {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.5;
            animation: pulseAura 4s ease-in-out infinite;
            z-index: 1;
        }

        .character-view {
            position: relative;
            z-index: 10;
            width: 220px;
            height: 220px;
            margin-bottom: 20px;
        }

        .character-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 0 40px rgba(74, 144, 226, 0.3);
            animation: floatCharacter 5s ease-in-out infinite;
        }

        .character-img {
            width: 100%;
            height: 100%;
            background-image: url('https://elcanusw.github.io/testing/img107/canuia2.png');
            background-size: cover;
            background-position: center;
        }

        .hand-wave {
            position: absolute;
            top: 120px;
            right: -10px;
            font-size: 45px;
            z-index: 20;
            animation: waveHand 2s ease-in-out infinite;
            transform-origin: bottom right;
        }

        .subtitle-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--terminal-green);
            border-radius: 12px;
            padding: 18px;
            color: var(--terminal-green);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            line-height: 1.4;
            min-height: 100px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            z-index: 30;
        }

        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            width: 100%;
            z-index: 30;
        }

        .option-btn {
            background: transparent;
            border: 1px solid var(--terminal-green);
            color: var(--terminal-green);
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }

        .option-btn.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .option-btn:hover {
            background: var(--terminal-green);
            color: #000;
            box-shadow: 0 0 20px var(--terminal-green);
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1rem;
            background-color: var(--terminal-green);
            margin-left: 4px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        /* Animaciones (Tus animaciones originales) */
        @keyframes pulseAura { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.2); opacity: 0.6; } }
        @keyframes floatCharacter { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes waveHand { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(20deg); } 75% { transform: rotate(-10deg); } }
        @keyframes blink { 50% { opacity: 0; } }

        /* Panel Inferior */
        .bottom-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        .btn-bottom {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-bottom:hover { border-color: var(--accent); }

        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; text-align: center; padding-top: 100px; height: auto; }
            .text-side h1 { font-size: 3rem; }
            .canuia-side { margin-top: 40px; margin-bottom: 120px; }
            .bottom-panel { width: 90%; flex-direction: column; bottom: 10px; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <canvas id="particle-canvas"></canvas>

    <nav class="glass-nav-top">
        <ul class="nav-list">
            <li><a href="index.html" class="active">Inicio</a></li>
            <li><a href="sobremi.html">Sobre Mí</a></li>
            <li><a href="servicios.html">Servicios</a></li>
            <li><a href="planes.html">Planes</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="text-side">
            <h1>eLcAnu 107D</h1>
            <p>Entre lo pensado y lo real, somos el puente.</p>
        </div>

        <div class="canuia-side">
            <div class="main-stage">
                <div class="aura-bg"></div>
                
                <div class="character-view">
                    <div class="character-circle">
                        <div class="character-img"></div>
                    </div>
                    <div class="hand-wave" id="hand">👋</div>
                </div>

                <div class="chat-interface">
                    <div class="subtitle-box">
                        <span id="text"></span><span class="cursor"></span>
                    </div>
                    <div class="options-grid" id="options"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="bottom-panel">
        <a href="contacto.html" class="btn-bottom">Contacto</a>
        <a href="servicios.html" class="btn-bottom">Servicios</a>
        <a href="planes.html" class="btn-bottom">Planes</a>
    </div>

    <script>
        const textElement = document.getElementById('text');
        const optionsElement = document.getElementById('options');
        const handElement = document.getElementById('hand');

        // TU LÓGICA DE CHAT ORIGINAL CON EL SALUDO QUE PEDISTE
        const chatData = {
            inicio: {
                texto: "¡Hola! Soy el Asistente virtual de 107D. ¿En qué puedo ayudarte hoy?",
                opciones: [
                    { texto: "Servicios 107D", proximo: "servicios" },
                    { texto: "Saber más de ti", proximo: "perfil" }
                ]
            },
            servicios: {
                texto: "Ofrezco Publicidad Digital (Community Manager, Redes Sociales) y Soluciones Gráficas (Logos, Flyers). ¿Qué necesitas?",
                opciones: [
                    { texto: "Publicidad", proximo: "web" },
                    { texto: "Diseño Gráfico", proximo: "diseno" },
                    { texto: "Volver", proximo: "inicio" }
                ]
            },
            perfil: {
                texto: "Soy apasionado por la tecnología, autodidacta en Diseño y Programación Web. ¿Vemos el Portafolio o te cuento más?",
                opciones: [
                    { texto: "Ver Portafolio", proximo: "portfolio" },
                    { texto: "Saber más de ti", link: "sobremi.html" },
                    { texto: "Volver", proximo: "inicio" }
                ]
            },
            web: {
                texto: "¡Genial! Desarrollo sitios rápidos y escalables. ¿Hablamos por WhatsApp?",
                opciones: [
                    { texto: "WhatsApp", link: "https://wa.me/+56974598279" },
                    { texto: "Ver más", proximo: "inicio" }
                ]
            },
            diseno: {
                texto: "El diseño es clave. Me enfoco en la experiencia del usuario. ¿Vemos ejemplos?",
                opciones: [
                    { texto: "Ir a Portfolio", link: "#" },
                    { label: "Volver", proximo: "inicio" }
                ]
            },
            portfolio: {
                texto: "¡Casi listo! Mi nueva galería de proyectos está en el horno.",
                opciones: [
                    { texto: "Entendido", proximo: "inicio" }
                ]
            }
        };

        function typeText(message, callback) {
            textElement.textContent = "";
            optionsElement.innerHTML = "";
            let i = 0;
            function nextChar() {
                if (i < message.length) {
                    textElement.textContent += message.charAt(i);
                    i++;
                    setTimeout(nextChar, 35);
                } else if (callback) {
                    callback();
                }
            }
            nextChar();
        }

        function showOptions(options) {
            options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.texto || opt.label;
                btn.onclick = () => {
                    if (opt.link) {
                        if (opt.link.startsWith('http')) window.open(opt.link, '_blank');
                        else window.location.href = opt.link;
                    } else {
                        loadStep(opt.proximo);
                    }
                };
                optionsElement.appendChild(btn);
                setTimeout(() => btn.classList.add('visible'), 100 * (index + 1));
            });
        }

        function loadStep(stepId) {
            const step = chatData[stepId];
            typeText(step.texto, () => showOptions(step.opciones));
            handElement.style.display = (stepId === 'inicio') ? "block" : "none";
        }

        // Partículas de fondo
        const pCanvas = document.getElementById('particle-canvas');
        const pCtx = pCanvas.getContext('2d');
        let particles = [];

        function resize() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
            initParticles();
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 70; i++) {
                particles.push({
                    x: Math.random() * pCanvas.width,
                    y: Math.random() * pCanvas.height,
                    size: Math.random() * 2,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3,
                    opacity: Math.random()
                });
            }
        }

        function animate() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            particles.forEach(p => {
                pCtx.fillStyle = `rgba(167, 139, 250, ${p.opacity})`;
                pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2); pCtx.fill();
                p.x += p.speedX; p.y += p.speedY;
                if (p.x < 0 || p.x > pCanvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > pCanvas.height) p.speedY *= -1;
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
        
        window.onload = () => setTimeout(() => loadStep('inicio'), 800);
    </script>
</body>
</html>
