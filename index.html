<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canu Ultra Loco PRO</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;500&display=swap');

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  color:white;
  overflow:hidden;
}

/* 🌌 FONDO */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
  linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
  url('https://i.ibb.co/4ny4T5Qg/1774621658204-2.jpg');
  background-size:cover;
  background-position:center;
  z-index:-1;
  animation:zoom 20s infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.15);}
}

.screen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.hidden{display:none;}

.logo{
  font-size:80px;
  font-family:'Montserrat';
  margin-bottom:30px;
  background:linear-gradient(90deg,#00ff88,#00ccff,#ff00cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.card{
  background:rgba(0,0,0,0.6);
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:400px;
  text-align:center;
  backdrop-filter:blur(10px);
}

button{
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.start-btn{
  background:linear-gradient(90deg,#00ff88,#00ccff);
  color:black;
  font-weight:bold;
}

/* QUIZ - Colores de respuesta */
.correcta{
  background:#00ff88 !important;
  color:black;
  font-weight:bold;
}

.incorrecta{
  background:#ff4d4d !important;
  color:white;
}

/* CACHIPUM mejorado */
.rps-score{
  display:flex;
  justify-content:center;
  gap:30px;
  margin:15px 0;
  font-size:18px;
  font-weight:bold;
}
.rps-score span{color:#00ff88;}

/* SNAKE */
#snakeCanvas{
  background:#111;
  border:5px solid #00ff88;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,255,136,0.6);
  image-rendering:pixelated;
}

/* Tres en raya */
.ttt-cell{
  background:rgba(255,255,255,0.1);
  color:white;
  font-size:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 4px 15px rgba(0,255,136,0.4);
  aspect-ratio:1/1;
}

.ttt-cell:hover{
  background:rgba(0,255,136,0.3);
  transform:scale(1.08);
}
</style>
</head>

<body>

<!-- MENU -->
<div class="screen" id="menu">
  <div class="logo">CANU</div>
  <button class="start-btn" onclick="iniciar()">🧠 Quiz</button>
  <button class="start-btn" onclick="irRPS()">⚔️ Cachipum PRO</button>
  <button class="start-btn" onclick="irPalabra()">🔤 Palabra</button>
  <button class="start-btn" onclick="irTresEnRaya()">❌⭕ Tres en Raya</button>
  <button class="start-btn" onclick="irSnake()">🐍 Snake</button>
</div>

<!-- QUIZ -->
<div class="screen hidden" id="quiz">
  <div class="card" id="quizBox"></div>
</div>

<!-- RESULTADO -->
<div class="screen hidden" id="resultado">
  <div class="card">
    <h2 id="final"></h2>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<!-- CACHIPUM MEJORADO -->
<div class="screen hidden" id="rps">
  <div class="card">
    <h2>⚔️ Cachipum PRO</h2>
    
    <div class="rps-score">
      <div>Tú: <span id="playerScoreRPS">0</span></div>
      <div>CPU: <span id="cpuScoreRPS">0</span></div>
    </div>

    <p id="rpsResult" style="font-size:22px; min-height:60px;">Elige tu movimiento</p>
    
    <button onclick="jugar('piedra')" style="font-size:28px;">🪨 Piedra</button>
    <button onclick="jugar('papel')" style="font-size:28px;">📄 Papel</button>
    <button onclick="jugar('tijera')" style="font-size:28px;">✂️ Tijera</button>
    
    <button class="start-btn" onclick="reiniciarRPS()">🔄 Reiniciar puntajes</button>
    <button class="start-btn" onclick="volver()">Volver al menú</button>
  </div>
</div>

<!-- PALABRA -->
<div class="screen hidden" id="palabra">
  <div class="card">
    <h2>Palabra Secreta</h2>
    <button class="start-btn" onclick="modoAhorcado()">Ahorcado</button>
    <p id="palabraTexto"></p>
    <input id="letra" maxlength="1">
    <button class="start-btn" onclick="intentarLetra()">Intentar</button>
    <p id="estadoA"></p>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<!-- TRES EN RAYA -->
<div class="screen hidden" id="tresEnRaya">
  <div class="card">
    <h2>❌⭕ Tres en Raya</h2>
    <p id="tttResult">Tu turno (❌)</p>
    <div id="board" style="display: grid; grid-template-columns: repeat(3, 80px); gap: 8px; justify-content: center; margin: 20px auto;">
      <div class="ttt-cell" data-index="0" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="1" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="2" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="3" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="4" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="5" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="6" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="7" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="8" onclick="hacerMovimiento(this)"></div>
    </div>
    <button class="start-btn" onclick="reiniciarTTT()">🔄 Reiniciar partida</button>
    <button class="start-btn" onclick="volver()">Volver al menú</button>
  </div>
</div>

<!-- 🔥 SNAKE NUEVO -->
<div class="screen hidden" id="snake">
  <div class="card">
    <h2>🐍 Snake Ultra Loco</h2>
    <p id="snakeScore" style="font-size:22px; margin-bottom:10px;">Puntaje: 0</p>
    
    <canvas id="snakeCanvas" width="400" height="400"></canvas>
    
    <p style="margin-top:10px; font-size:14px; opacity:0.8;">Usa las flechas del teclado ← ↑ ↓ →<br>¡Evita las paredes y tu propio cuerpo!</p>
    
    <button class="start-btn" onclick="reiniciarSnake()">🔄 Nueva partida</button>
    <button class="start-btn" onclick="volver()">Volver al menú</button>
  </div>
</div>

<script>
// QUIZ (ya mejorado)
const preguntas = [
  {texto:"¿Dónde nací?", opciones:["Valparaíso, Chile","Trondheim, Noruega","Noje"], correcta:1},
  {texto:"Llegando a Chile... ¿A qué cerro llegué?", opciones:["Barón","Lecheros","Cárcel"], correcta:1},
  {texto:"¿Cuántos hijos tengo actualmente (2026)?", opciones:["4","2","3"], correcta:2}
];

let i = 0;
let puntos = 0;

function iniciar(){
  i = 0; puntos = 0;
  cambiar("menu","quiz");
  mostrar();
}

function mostrar(){
  let p = preguntas[i];
  quizBox.innerHTML = `
    <h2>${p.texto}</h2>
    ${p.opciones.map((op, idx) => `
      <button class="opcion" onclick="responder(this, \( {idx})"> \){op}</button>
    `).join("")}
  `;
}

function responder(btn, idx){
  let correcta = preguntas[i].correcta;
  let botones = document.querySelectorAll(".opcion");
  botones.forEach(b => b.disabled = true);
  botones[correcta].classList.add("correcta");
  if(idx !== correcta){
    btn.classList.add("incorrecta");
  } else {
    puntos++;
  }
  setTimeout(() => {
    i < preguntas.length - 1 ? (i++, mostrar()) : fin();
  }, 1200);
}

function fin(){
  cambiar("quiz","resultado");
  final.innerText = `Puntaje: \( {puntos}/ \){preguntas.length}`;
}

// ====================== CACHIPUM MEJORADO ======================
let playerScoreRPS = 0;
let cpuScoreRPS = 0;

function irRPS(){
  cambiar("menu","rps");
  reiniciarRPS();
}

function reiniciarRPS(){
  playerScoreRPS = 0;
  cpuScoreRPS = 0;
  document.getElementById("playerScoreRPS").textContent = "0";
  document.getElementById("cpuScoreRPS").textContent = "0";
  rpsResult.innerText = "Elige tu movimiento";
}

function jugar(p){
  let ops = ["piedra","papel","tijera"];
  let cpu = ops[Math.floor(Math.random()*3)];
  let res = "";

  if(p === cpu){
    res = "¡Empate! 🤝";
  } else if(
    (p==="piedra" && cpu==="tijera") ||
    (p==="papel" && cpu==="piedra") ||
    (p==="tijera" && cpu==="papel")
  ){
    res = "¡GANASTE! 😎";
    playerScoreRPS++;
  } else {
    res = "CPU ganó 💀";
    cpuScoreRPS++;
  }

  // Actualizar puntajes
  document.getElementById("playerScoreRPS").textContent = playerScoreRPS;
  document.getElementById("cpuScoreRPS").textContent = cpuScoreRPS;

  // Mostrar resultado con emojis grandes
  rpsResult.innerHTML = `
    ${p} <span style="font-size:32px;">vs</span> ${cpu}<br>
    <span style="font-size:26px;">${res}</span>
  `;
}

// ====================== PALABRA ======================
const palabras=["gato","perro","casa","codigo","juego"];
let palabraSecreta="",progreso=[],intentos;

function irPalabra(){cambiar("menu","palabra");}
function modoAhorcado(){
  palabraSecreta=palabras[Math.floor(Math.random()*palabras.length)];
  progreso=Array(palabraSecreta.length).fill("_");
  intentos=6;
  actualizar();
}
function actualizar(){
  palabraTexto.innerText=progreso.join(" ");
  estadoA.innerText="Intentos: "+intentos;
}
function intentarLetra(){
  let l=letra.value.toLowerCase(); letra.value="";
  if(!l) return;
  let ok=false;
  for(let i=0;i<palabraSecreta.length;i++){
    if(palabraSecreta[i]===l){ progreso[i]=l; ok=true; }
  }
  if(!ok) intentos--;
  if(intentos<=0){ alert("Perdiste 😭 → "+palabraSecreta); modoAhorcado(); }
  if(!progreso.includes("_")){ alert("Ganaste 🔥"); modoAhorcado(); }
  actualizar();
}

// ====================== TRES EN RAYA ======================
let board = Array(9).fill(null);
let gameOver = false;

function irTresEnRaya(){ cambiar("menu","tresEnRaya"); reiniciarTTT(); }
function reiniciarTTT(){
  board = Array(9).fill(null);
  gameOver = false;
  document.querySelectorAll(".ttt-cell").forEach(c => c.textContent = "");
  tttResult.innerText = "Tu turno (❌)";
}
function hacerMovimiento(cell){
  if(gameOver) return;
  let idx = parseInt(cell.dataset.index);
  if(board[idx]) return;
  board[idx] = "❌"; cell.textContent = "❌";
  if(checkWin("❌")){ tttResult.innerText = "¡GANASTE! 🎉"; gameOver = true; return; }
  if(board.every(c => c)){ tttResult.innerText = "Empate 😐"; gameOver = true; return; }
  tttResult.innerText = "Turno de CPU (⭕)";
  setTimeout(cpuMove, 600);
}
function cpuMove(){
  if(gameOver) return;
  let empty = [];
  for(let i=0;i<9;i++) if(!board[i]) empty.push(i);
  if(empty.length===0) return;
  let randomIdx = empty[Math.floor(Math.random()*empty.length)];
  board[randomIdx] = "⭕";
  document.querySelectorAll(".ttt-cell")[randomIdx].textContent = "⭕";
  if(checkWin("⭕")){ tttResult.innerText = "CPU ganó 💀"; gameOver = true; return; }
  if(board.every(c => c)){ tttResult.innerText = "Empate 😐"; gameOver = true; return; }
  tttResult.innerText = "Tu turno (❌)";
}
function checkWin(player){
  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  return wins.some(combo => combo.every(i => board[i] === player));
}

// ====================== SNAKE NUEVO ======================
let snakeCanvas, ctx;
let snake, dx, dy, food, scoreSnake, gameInterval, tileCount = 20, gridSize = 20;

function irSnake(){
  cambiar("menu","snake");
  iniciarSnake();
}

function iniciarSnake(){
  snakeCanvas = document.getElementById("snakeCanvas");
  ctx = snakeCanvas.getContext("2d");
  
  snake = [{x:10, y:10}];
  dx = 1; dy = 0;
  scoreSnake = 0;
  document.getElementById("snakeScore").textContent = "Puntaje: 0";
  
  placeFood();
  
  if(gameInterval) clearInterval(gameInterval);
  gameInterval = setInterval(gameLoop, 110);
}

function gameLoop(){
  if(!document.getElementById("snake").classList.contains("hidden")){
    updateSnake();
    drawSnake();
  }
}

function updateSnake(){
  const head = {x: snake[0].x + dx, y: snake[0].y + dy};
  snake.unshift(head);

  // Comió?
  if(head.x === food.x && head.y === food.y){
    scoreSnake++;
    document.getElementById("snakeScore").textContent = "Puntaje: " + scoreSnake;
    placeFood();
  } else {
    snake.pop();
  }

  // Colisión
  if(head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount ||
     snake.some((part, index) => index > 0 && part.x === head.x && part.y === head.y)){
    clearInterval(gameInterval);
    setTimeout(() => {
      alert("💀 GAME OVER 💀\nPuntaje final: " + scoreSnake);
      reiniciarSnake();
    }, 100);
  }
}

function drawSnake(){
  // Fondo
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, snakeCanvas.width, snakeCanvas.height);

  // Snake (neón verde)
  ctx.fillStyle = "#00ff88";
  snake.forEach(part => {
    ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
  });

  // Comida (neón rosa)
  ctx.fillStyle = "#ff00cc";
  ctx.fillRect(food.x * gridSize + 1, food.y * gridSize + 1, gridSize - 2, gridSize - 2);
}

function placeFood(){
  food = {
    x: Math.floor(Math.random() * tileCount),
    y: Math.floor(Math.random() * tileCount)
  };
  // No aparece en el snake
  while(snake.some(part => part.x === food.x && part.y === food.y)){
    food.x = Math.floor(Math.random() * tileCount);
    food.y = Math.floor(Math.random() * tileCount);
  }
}

function reiniciarSnake(){
  if(gameInterval) clearInterval(gameInterval);
  iniciarSnake();
}

// Controles con flechas del teclado
document.addEventListener("keydown", e => {
  if(document.getElementById("snake").classList.contains("hidden")) return;
  
  switch(e.key){
    case "ArrowLeft":  if(dx !== 1) { dx = -1; dy = 0; } break;
    case "ArrowRight": if(dx !== -1){ dx = 1;  dy = 0; } break;
    case "ArrowUp":    if(dy !== 1) { dx = 0;  dy = -1;} break;
    case "ArrowDown":  if(dy !== -1){ dx = 0;  dy = 1; } break;
  }
});

// ====================== NAV ======================
function volver(){
  document.querySelectorAll(".screen").forEach(s => s.classList.add("hidden"));
  document.getElementById("menu").classList.remove("hidden");
  
  // Detener Snake si estaba jugando
  if(gameInterval) clearInterval(gameInterval);
}

function cambiar(a,b){
  document.getElementById(a).classList.add("hidden");
  document.getElementById(b).classList.remove("hidden");
}
</script>

</body>
</html>
