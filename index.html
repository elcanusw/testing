<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>107D - Tu imaginación propone</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%) !important;
            overflow-x: hidden;
        }

        .hero-container {
            display: flex;
            align-items: center;
            justify-content: space-around;
            min-height: 70vh;
            padding: 0 5%;
            flex-wrap: wrap;
            margin-top: 50px;
        }

        .hero-text {
            max-width: 500px;
            z-index: 2;
            text-align: left;
        }

        .hero-text h1 {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            color: white;
        }

        .hero-text span {
            color: #a78bfa;
        }

        .avatar-section {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 40px 0;
        }

        /* Contenedor para el iframe interactivo */
        .iframe-wrapper {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 4px solid #3b82f6;
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.5);
            overflow: hidden; /* Para que el contenido del iframe no se salga del círculo */
            z-index: 1;
            background: black;
        }

        .iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .floating-tag {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            white-space: nowrap;
            color: #cbd5e1;
            z-index: 2;
        }

        .tag-1 { top: -10px; right: -20px; }
        .tag-2 { bottom: 40px; right: -60px; }
        .tag-3 { bottom: -10px; left: -30px; }
        .tag-4 { top: 30px; left: -70px; }

        .bottom-nav-main {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 100px;
            width: 100%;
            flex-wrap: wrap;
        }

        .btn-main {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 30px;
            border-radius: 12px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 600;
            min-width: 160px;
            text-align: center;
        }

        .btn-main:hover {
            background: #a78bfa;
            color: white;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <nav class="glass-nav-top">
        <ul class="nav-list">
            <li><a href="index.html" class="active">INICIO</a></li>
            <li><a href="sobremi.html">SOBRE MÍ</a></li>
            <li><a href="servicios.html">SERVICIOS</a></li>
            <li><a href="planes.html">PLANES</a></li>
            <li><a href="contacto.html">CONTACTO</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="hero-container">
            <div class="hero-text">
                <h1>Tu imaginación propone en <span>107D</span> concretamos...</h1>
                <p style="color: #94a3b8; font-size: 1.1rem;">Entre lo pensado y lo real, somos el puente.</p>
            </div>

            <div class="avatar-section">
                <div class="iframe-wrapper">
                    <iframe src="https://elcanusw.github.io/testing/canuia.html" scrolling="no"></iframe>
                </div>
                
                <div class="floating-tag tag-1">Innovación Constante</div>
                <div class="floating-tag tag-2">Rendimiento ☑️</div>
                <div class="floating-tag tag-3">Proyectos Recientes</div>
                <div class="floating-tag tag-4">Servicios</div>
            </div>
        </div>

        <div class="bottom-nav-main">
            <a href="contacto.html" class="btn-main">CONTACTO</a>
            <a href="servicios.html" class="btn-main">SERVICIOS</a>
            <a href="planes.html" class="btn-main">PLANES</a>
        </div>
    </main>

</body>
</html>
